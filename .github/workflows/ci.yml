name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Ruff lint
        run: uv run ruff check master_thesis_code/

      - name: Ruff format check
        run: uv run ruff format --check master_thesis_code/

      - name: mypy
        run: uv run mypy master_thesis_code/

      - name: pytest (CPU only)
        run: uv run pytest -m "not gpu and not slow"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: pip-audit (security)
        run: uv run pip-audit

  integration:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Run integration tests
        run: uv run pytest -m slow --save-test-plots -v

      - name: Upload test plots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-plots
          path: test-artifacts/
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: test-artifacts/

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Build docs
        run: uv run make -C docs html SPHINXOPTS="-W"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build/html/
